services:
  app:
    image: ${IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - path: ./prod/.env
      - path: ./prod/override.env
        required: false
    volumes:
      - runtime_data:/app/runtime
      - logs_data:/app/runtime/logs
    deploy:
      replicas: 2
      update_config:
        delay: 10s
        parallelism: 1
        order: start-first
        failure_action: rollback
        monitor: 10s
      rollback_config:
        parallelism: 0
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  web:
    restart: unless-stopped
    ports:
      - "8080:80"
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first

  mysql:
    ports:
      - "3306:3306"

  redis:
    ports:
      - "6379:6379"