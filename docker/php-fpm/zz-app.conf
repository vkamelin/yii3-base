[global]
error_log = /app/runtime/logs/php-fpm/error.log
daemonize = no

[www]
user = www-data
group = www-data
listen = 9000
listen.owner = www-data
listen.group = www-data
listen.mode = 0660
clear_env = no
catch_workers_output = yes
access.log = /app/runtime/logs/php-fpm/access.log
pm = dynamic
pm.max_children = 20
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
